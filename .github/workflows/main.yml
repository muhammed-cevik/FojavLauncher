name: Fojav Launcher CI

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get LTW
        run: |
          sudo apt-get update -qq && sudo apt-get install -y wget
          cd app_pojavlauncher/libs
          wget -q https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Get JRE 8
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre8
          name: jre8-pojav

      - name: Get JRE17
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-new
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre17-pojav

      - name: Get JRE21
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-21
          workflow_conclusion: success
          repo: PojavLauncherTeam/android-openjdk-build-multiarch
          branch: buildjre17-21
          name: jre21-pojav

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build JRE JAR files
        run: |
          ./scripts/languagelist_updater.sh
          mkdir -p out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          gradle :app_pojavlauncher:assembleDebug --no-daemon
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/FojavLauncher-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FojavLauncher-APK
          path: out/FojavLauncher-debug.apk
          retention-days: 30
