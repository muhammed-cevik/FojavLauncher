name: Fojav Launcher CI

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get LTW
        run: |
          cd app_pojavlauncher/libs
          wget -q https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew :app_pojavlauncher:assembleDebug --no-daemon
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/FojavLauncher-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FojavLauncher-APK
          path: out/FojavLauncher-debug.apk
          retention-days: 30