name: Fojav Launcher CI

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get LTW
        run: |
          cd app_pojavlauncher/libs
          wget -q https://github.com/PojavLauncherTeam/LTW/releases/latest/download/ltw-release.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew :app_pojavlauncher:assembleDebug --no-daemon
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/FojavLauncher-debug.apk

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build Release APK
        run: |
          ./gradlew :app_pojavlauncher:assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon
          mv app_pojavlauncher/build/outputs/apk/release/app_pojavlauncher-release.apk out/FojavLauncher-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FojavLauncher-Debug
          path: out/FojavLauncher-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FojavLauncher-Release
          path: out/FojavLauncher-release.apk
          retention-days: 30
